name: Sync Words

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'ga'

      - name: Resolve Notepad ID
        id: resolve
        run: |
          RESPONSE=$(curl -s -w '\n%{http_code}' -H "Authorization: Bearer ${{ secrets.MAIMEMO_TOKEN }}" "https://open.maimemo.com/open/api/v1/notepads?limit=5&offset=0")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP Status: $HTTP_CODE"
          NOTEPAD_ID=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['notepads'][0]['id'])")
          echo "Resolved Notepad ID: $NOTEPAD_ID"
          echo "notepad_id=$NOTEPAD_ID" >> $GITHUB_OUTPUT

      - name: Run Sync
        run: dotnet run --project src/EudicSyncToMaiMemo/EudicSyncToMaiMemo.csproj --configuration Release -- --sync-once
        env:
          Eudic__Authorization: ${{ secrets.EUDIC_AUTHORIZATION }}
          Eudic__DefaultBookId: ${{ secrets.EUDIC_BOOK_ID }}
          MaiMemo__Provider: OpenApi
          MaiMemo__Token: ${{ secrets.MAIMEMO_TOKEN }}
          MaiMemo__DefaultNotepadId: ${{ steps.resolve.outputs.notepad_id }}
          Notification__Enabled: ${{ secrets.NOTIFICATION_ENABLED }}
          Notification__Url: ${{ secrets.NOTIFICATION_URL }}
          Notification__RequestBody: ${{ secrets.NOTIFICATION_REQUEST_BODY }}
          Notification__Headers: ${{ secrets.NOTIFICATION_HEADERS }}
